apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
- ../base_prod
- ./hpa.yaml
- ./secret-db.yaml
configurations:
- name-reference.yaml
configMapGenerator:
- behavior: merge
  literals:
  - GLOBAL_REGION_CODE="us-west-1"
  name: hello-app
images:
- name: hello-app-image
  newName: viyou/hello-app
  newTag: 2026-05-14.35-453f4fb

patches:
- path: deployment_workload_patch.yaml
