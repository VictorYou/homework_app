apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
- ../base_dev
- ./hpa.yaml
- ./secret-db.yaml
configurations:
- name-reference.yaml
configMapGenerator:
- behavior: merge
  literals:
  - GLOBAL_REGION_CODE="us-east-2"
  name: hello-app
images:
- name: hello-app-image
  newName: viyou/hello-app
  newTag: "3"

patches:
- path: deployment_workload_patch.yaml
